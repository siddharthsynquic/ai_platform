server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100M;

    # gzip + brotli hints
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Long-cache hashed asset bundles
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Heavy site-agent assets copied from client_reference at build time
    location /uploads/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /site-data/images/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /reports/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # site-data JSON (queries, chat history, projects, reports metadata)
    location /site-data/ {
        expires 1h;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API reverse proxy → backend service (docker network name)
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # WebSocket upgrade for /ws (backend supports pub/sub)
    location /ws {
        proxy_pass http://backend:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: every unknown path → index.html (React Router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
